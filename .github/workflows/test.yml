---
name: Testing and linting

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '45 8 * * 6'

env:
  TYPO3_EXTENSION_KEY: mediaoembed
  MAIN_PHP_VERSION: 8.3
  CI: true

jobs:
  extension-test:
    name: 'Testing and linting'
    uses: astehlik/typo3-extension-buildtools/.github/workflows/extension-test.yml@TYPO3_13

  extension-qltysh-coverage:
    name: 'QLTY_COVERAGE_TOKEN coverage'
    uses: astehlik/typo3-extension-buildtools/.github/workflows/extension-qltysh-coverage.yml@TYPO3_13
    if: github.ref == 'refs/heads/develop'
    secrets:
      QLTY_COVERAGE_TOKEN: ${{ secrets.QLTY_COVERAGE_TOKEN }}
